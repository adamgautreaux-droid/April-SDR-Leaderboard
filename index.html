<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDR Leaderboard — April 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark-bg:#050d1a;
  --dark-panel:#0a1628;
  --dark-panel2:#0d1f38;
  --dark-border:rgba(0,102,255,0.22);
  --light-bg:#eef1f7;
  --light-card:#ffffff;
  --light-border:#dde3ef;
  --light-border2:#c8d2e8;
  --text-primary:#0d1a2e;
  --text-secondary:#4a5878;
  --text-dim:#8a96b0;
  --blue:#1a7fff;
  --blue2:#0055cc;
  --cyan:#00b4ff;
  --green:#00c96b;
  --red:#e8294a;
  --r1:#00b4ff;
  --r2:#0d1a2e;
  --r3:#1a7fff;
}

/* DARK CHROME */
body{font-family:"Barlow",sans-serif;background-color:var(--dark-bg);color:#ffffff;min-height:100vh;}
.chrome{
  background-color:var(--dark-bg);
  background-image:linear-gradient(rgba(0,102,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,102,255,0.05) 1px,transparent 1px),radial-gradient(ellipse 80% 60% at 50% -5%,rgba(0,80,200,0.2) 0%,transparent 70%);
  background-size:40px 40px,40px 40px,100% 100%;
  padding:20px 16px 28px;
}
.wrap{max-width:940px;margin:0 auto;}

/* DIVIDER */
.chrome-end{
  height:4px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),transparent);
  opacity:0.5;
}

/* LIGHT CARD SECTION */
.card-section{
  background:var(--light-bg);
  padding:20px 16px 60px;
}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(0,180,255,0.2);padding-bottom:16px;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.eyebrow{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:.35em;color:var(--cyan);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.eyebrow::before{content:"";display:inline-block;width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 8px var(--cyan);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
h1{font-family:"Rajdhani",sans-serif;font-size:clamp(34px,7vw,64px);font-weight:700;line-height:1;letter-spacing:.02em;text-transform:uppercase;color:#ffffff;}
h1 span{color:var(--cyan);}
.header-right{text-align:right;font-family:"Share Tech Mono",monospace;font-size:11px;color:rgba(255,255,255,0.5);line-height:2;}
.header-right span{color:#ffffff;}

/* METRIC CARDS — dark */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px;margin-bottom:8px;}
.mc{background:var(--dark-panel);border:1px solid var(--dark-border);padding:14px 16px;position:relative;overflow:hidden;}
.mc::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.mc-rev::before{background:linear-gradient(90deg,var(--cyan),var(--blue));}
.mc-cls::before{background:linear-gradient(90deg,#e8294a,#990022);}
.mc-sets::before{background:linear-gradient(90deg,var(--blue),#003399);}
.mc-avg::before{background:linear-gradient(90deg,#00c96b,#006633);}
.mc-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.25em;color:rgba(255,255,255,0.5);margin-bottom:6px;}
.mc-val{font-family:"Rajdhani",sans-serif;font-size:clamp(24px,4vw,34px);font-weight:700;line-height:1;color:#ffffff;}

/* PACE — dark */
.pace{background:var(--dark-panel);border:1px solid var(--dark-border);padding:14px 18px;margin-bottom:16px;}
.pace-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.3em;color:var(--cyan);margin-bottom:8px;}
.pace-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.pace-title{font-family:"Rajdhani",sans-serif;font-size:clamp(15px,3vw,21px);font-weight:600;color:#ffffff;}
.pace-stats{display:flex;gap:24px;flex-wrap:wrap;}
.ps-val{font-family:"Rajdhani",sans-serif;font-size:22px;font-weight:700;color:var(--cyan);display:block;}
.ps-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,0.5);}
.pbar-bg{height:4px;background:rgba(255,255,255,0.08);}
.pbar-fg{height:100%;background:linear-gradient(90deg,var(--blue2),var(--cyan));transition:width 1.2s ease;box-shadow:0 0 10px rgba(0,180,255,0.4);}

/* SCORING KEY — dark */
.scoring-key{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.sk-item{flex:1;min-width:70px;background:var(--dark-panel);border:1px solid var(--dark-border);padding:10px 12px;display:flex;align-items:center;gap:8px;}
.sk-num{font-family:"Rajdhani",sans-serif;font-size:22px;font-weight:700;}
.sk-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,0.5);line-height:1.6;}
.sk-note{flex:2;min-width:140px;background:transparent;border:1px solid rgba(255,255,255,0.1);padding:10px 14px;display:flex;align-items:center;}
.sk-note-text{font-family:"Share Tech Mono",monospace;font-size:10px;color:rgba(255,255,255,0.5);line-height:1.6;}

/* SPOTLIGHT — dark */
.spotlight{background:linear-gradient(135deg,rgba(0,100,220,0.2),rgba(0,20,60,0.9));border:1px solid rgba(0,180,255,0.3);padding:14px 18px;margin-bottom:0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.spotlight-label{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.3em;color:var(--cyan);margin-bottom:4px;}
.spotlight-name{font-family:"Rajdhani",sans-serif;font-size:22px;font-weight:700;color:#ffffff;}
.spotlight-stat{font-family:"Share Tech Mono",monospace;font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.spotlight-score-val{font-family:"Rajdhani",sans-serif;font-size:36px;font-weight:700;color:var(--cyan);line-height:1;}
.spotlight-score-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:.2em;}

/* TABS — on the light section */
.tabs{display:flex;border-bottom:2px solid var(--light-border2);margin-bottom:20px;overflow-x:auto;}
.tab{cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;font-family:"Share Tech Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:12px 18px;color:var(--text-dim);transition:all .2s;margin-bottom:-2px;white-space:nowrap;}
.tab:hover{color:var(--text-primary);}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.sec{display:none;}.sec.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* REP CARDS — light */
.rep-card{
  background:var(--light-card);
  border:1px solid var(--light-border);
  border-left:3px solid var(--light-border2);
  margin-bottom:6px;
  animation:fadeUp .4s ease forwards;
  opacity:0;
  box-shadow:0 1px 3px rgba(13,26,46,0.06);
  transition:box-shadow .2s;
}
.rep-card:hover{box-shadow:0 4px 12px rgba(13,26,46,0.1);}
.rep-card.rank-1{border-left-color:var(--cyan);background:linear-gradient(135deg,rgba(0,180,255,0.04),#ffffff);}
.rep-card.rank-2{border-left-color:var(--text-primary);}
.rep-card.rank-3{border-left-color:var(--blue);}
.rep-card.inactive{background:#f7f9fc;border-color:#e8ecf4;border-left-color:#e8ecf4;box-shadow:none;}
.rep-top{display:grid;grid-template-columns:52px 1fr auto;gap:0 12px;padding:14px 16px 0;align-items:start;}
.rep-rank{font-family:"Rajdhani",sans-serif;font-size:30px;font-weight:700;line-height:1;padding-top:2px;}
.rep-name{font-family:"Rajdhani",sans-serif;font-size:20px;font-weight:600;line-height:1;margin-bottom:3px;color:var(--text-primary);}
.rep-team{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.15em;color:var(--text-dim);}
.rep-pace{display:inline-block;font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.12em;padding:2px 7px;margin-left:8px;vertical-align:middle;border-radius:2px;}
.pace-on{background:rgba(0,201,107,0.1);color:var(--green);border:1px solid rgba(0,201,107,0.3);}
.pace-behind{background:rgba(232,41,74,0.08);color:var(--red);border:1px solid rgba(232,41,74,0.2);}
.rep-score-col{text-align:right;}
.rep-score{font-family:"Rajdhani",sans-serif;font-size:34px;font-weight:700;line-height:1;}
.rep-score-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--text-dim);margin-top:2px;}
.rep-bar-wrap{padding:8px 16px 0;}
.rep-bar-bg{height:2px;background:#eef1f7;}
.rep-bar-fg{height:100%;transition:width .9s ease;}
.rep-stats{display:flex;flex-wrap:wrap;padding:10px 16px;}
.rep-stat{padding:4px 14px 4px 0;min-width:80px;}
.stat-val{font-family:"Rajdhani",sans-serif;font-size:16px;font-weight:600;color:var(--text-primary);}
.stat-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.12em;color:var(--text-dim);}
.rep-gap{padding:8px 16px 12px;border-top:1px solid var(--light-border);}
.gap-leading{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--green);}
.gap-behind{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--text-dim);}
.gap-action{font-family:"Barlow",sans-serif;font-size:12px;font-weight:600;margin-top:3px;color:var(--text-primary);}
.gap-action em{color:var(--blue);font-style:normal;}
.rep-inactive-msg{padding:10px 16px 14px;font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--text-dim);letter-spacing:.05em;}
.rep-inactive-cta{font-family:"Rajdhani",sans-serif;font-size:14px;font-weight:600;color:var(--blue);margin-top:4px;}
.zero-header{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:.3em;color:var(--text-dim);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--light-border2);}

/* TEAMS — light */
.ts-title{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:.28em;color:var(--blue);margin-bottom:10px;}
.ts-card{background:var(--light-card);border:1px solid var(--light-border);border-left:3px solid var(--light-border2);display:grid;grid-template-columns:42px 1fr auto;gap:0 12px;padding:14px 16px;margin-bottom:6px;animation:fadeUp .35s ease forwards;opacity:0;align-items:center;box-shadow:0 1px 3px rgba(13,26,46,0.06);}
.ts-rank{font-family:"Rajdhani",sans-serif;font-size:24px;font-weight:700;}
.ts-name{font-family:"Rajdhani",sans-serif;font-size:17px;font-weight:600;margin-bottom:3px;color:var(--text-primary);}
.ts-meta{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.12em;color:var(--text-dim);}
.ts-avgs{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap;}
.ts-avg-val{font-family:"Rajdhani",sans-serif;font-size:14px;font-weight:600;color:var(--text-primary);}
.ts-avg-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.1em;color:var(--text-dim);}
.ts-score{font-family:"Rajdhani",sans-serif;font-size:26px;font-weight:700;text-align:right;}
.ts-score-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.15em;color:var(--text-dim);margin-top:2px;text-align:right;}
.ts-bar-row{grid-column:1/-1;margin-top:8px;}
.ts-bar-bg{height:2px;background:#eef1f7;}
.ts-bar-fg{height:100%;transition:width .9s ease;}
.team-detail-title{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:.28em;color:var(--text-dim);margin:20px 0 10px;}
.tc{background:var(--light-card);border:1px solid var(--light-border);margin-bottom:8px;overflow:hidden;animation:fadeUp .4s ease forwards;opacity:0;box-shadow:0 1px 3px rgba(13,26,46,0.06);}
.tc-head{background:#f7f9fc;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--light-border);}
.tc-title{font-family:"Rajdhani",sans-serif;font-size:18px;font-weight:700;color:var(--text-primary);}
.tc-badge{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.18em;color:var(--text-dim);margin-top:3px;}
.tc-totals{display:flex;gap:18px;flex-wrap:wrap;}
.tc-tot-val{font-family:"Rajdhani",sans-serif;font-size:16px;font-weight:700;color:var(--blue);display:block;}
.tc-tot-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.1em;color:var(--text-dim);}
.tc-avgs-row{display:grid;grid-template-columns:repeat(3,1fr);background:#f7f9fc;border-bottom:1px solid var(--light-border);}
.tc-avg-cell{padding:9px 14px;text-align:center;border-right:1px solid var(--light-border);}
.tc-avg-cell:last-child{border-right:none;}
.tc-avg-val{font-family:"Rajdhani",sans-serif;font-size:15px;font-weight:700;color:var(--text-primary);}
.tc-avg-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.1em;color:var(--text-dim);margin-top:1px;}
.tc-member{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--light-border);}
.tc-member:last-child{border-bottom:none;}
.tc-m-name{font-family:"Rajdhani",sans-serif;font-size:15px;font-weight:500;flex:1;color:var(--text-primary);}
.tc-m-stats{font-family:"Share Tech Mono",monospace;font-size:9px;color:var(--text-dim);flex:1;text-align:right;}
.tc-m-score{font-family:"Rajdhani",sans-serif;font-size:15px;font-weight:700;color:var(--blue);min-width:46px;text-align:right;}
.tc-m-score-lbl{font-family:"Share Tech Mono",monospace;font-size:9px;color:var(--text-dim);margin-left:2px;}

/* HOW TO WIN — mixed */
.htw-hero{background:linear-gradient(135deg,rgba(0,60,180,0.15),rgba(0,20,60,0.85));border:1px solid rgba(0,180,255,0.25);padding:28px 24px;margin-bottom:14px;position:relative;overflow:hidden;}
.htw-hero::before{content:"DIAL. BOOK. CLOSE. WIN.";position:absolute;bottom:-10px;right:-10px;font-family:"Rajdhani",sans-serif;font-size:80px;font-weight:700;color:rgba(0,100,255,0.06);letter-spacing:.05em;white-space:nowrap;pointer-events:none;}
.htw-hero-eye{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:.35em;color:var(--cyan);margin-bottom:8px;}
.htw-hero-title{font-family:"Rajdhani",sans-serif;font-size:clamp(28px,5.5vw,46px);font-weight:700;line-height:1.1;margin-bottom:10px;text-transform:uppercase;color:#ffffff;}
.htw-hero-title span{color:var(--cyan);}
.htw-hero-sub{font-family:"Barlow",sans-serif;font-size:14px;color:rgba(255,255,255,0.6);line-height:1.7;max-width:540px;}
.htw-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.htw-card{background:var(--light-card);border:1px solid var(--light-border);border-top:3px solid;padding:18px;box-shadow:0 1px 3px rgba(13,26,46,0.06);}
.htw-card-weight{font-family:"Rajdhani",sans-serif;font-size:42px;font-weight:700;line-height:1;}
.htw-card-label{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.25em;color:var(--text-dim);margin:4px 0 10px;}
.htw-card-tip{font-family:"Barlow",sans-serif;font-size:13px;color:var(--text-secondary);line-height:1.6;}
.htw-card-tip strong{display:block;color:var(--text-primary);margin-bottom:4px;}
.htw-rule{background:var(--light-card);border:1px solid var(--light-border);padding:18px 22px;margin-bottom:8px;box-shadow:0 1px 3px rgba(13,26,46,0.06);}
.htw-rule-title{font-family:"Rajdhani",sans-serif;font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text-primary);}
.htw-rule-body{font-family:"Barlow",sans-serif;font-size:13px;color:var(--text-secondary);line-height:1.7;}
.htw-rule-body strong{color:var(--text-primary);}
.htw-example{background:#f0f6ff;border:1px solid #c8d8f0;padding:18px 22px;margin-bottom:14px;}
.htw-example-title{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.28em;color:var(--blue);margin-bottom:12px;}
.htw-ex-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--light-border);padding:9px 0;flex-wrap:wrap;gap:4px;}
.htw-ex-row:last-child{border-bottom:none;}
.htw-ex-name{font-family:"Rajdhani",sans-serif;font-size:15px;font-weight:500;color:var(--text-primary);}
.htw-ex-stats{font-family:"Share Tech Mono",monospace;font-size:9px;color:var(--text-dim);}
.htw-ex-score{font-family:"Rajdhani",sans-serif;font-size:22px;font-weight:700;color:var(--blue);}
.htw-cta{border:1px solid rgba(0,180,255,0.3);background:linear-gradient(135deg,rgba(0,80,200,0.08),rgba(0,40,120,0.04));padding:24px;text-align:center;}
.htw-cta-title{font-family:"Rajdhani",sans-serif;font-size:clamp(20px,4vw,30px);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-primary);}
.htw-cta-title span{color:var(--blue);}
.htw-cta-body{font-family:"Barlow",sans-serif;font-size:13px;color:var(--text-secondary);line-height:1.6;}

/* FOOTER */
.footer{border-top:1px solid var(--light-border2);margin-top:40px;padding-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.fl{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--text-dim);letter-spacing:.15em;}
.fr{font-family:"Rajdhani",sans-serif;font-size:14px;color:var(--text-dim);letter-spacing:.1em;}

/* RESPONSIVE */
@media(max-width:600px){
  .htw-cards{grid-template-columns:1fr;}
  .tc-avgs-row{grid-template-columns:1fr 1fr;}
  .tc-avg-cell:last-child{grid-column:1/-1;border-top:1px solid var(--light-border);border-right:none;}
  .tabs{overflow-x:auto;}
  .rep-top{grid-template-columns:38px 1fr auto;}
  .ts-card{grid-template-columns:34px 1fr auto;}
  .pace-stats{gap:14px;}
}
</style>
</head>
<body>

<!-- DARK CHROME -->
<div class="chrome">
<div class="wrap">
  <div class="header">
    <div>
      <div class="eyebrow">SDR PERFORMANCE &middot; SETTER DIVISION &middot; LIVE</div>
      <h1 id="hMonth"></h1>
    </div>
    <div class="header-right" id="hMeta"></div>
  </div>
  <div class="metrics" id="metricCards"></div>
  <div class="pace">
    <div class="pace-lbl">MONTHLY GOAL PACE &mdash; TARGET $1,250,000</div>
    <div class="pace-row"><div class="pace-title" id="paceTitle"></div><div class="pace-stats" id="paceStats"></div></div>
    <div class="pbar-bg"><div class="pbar-fg" id="paceFill" style="width:0%"></div></div>
  </div>
  <div class="scoring-key" id="scoringKey"></div>
  <div class="spotlight" id="spotlight"></div>
</div>
</div>

<!-- DIVIDER -->
<div class="chrome-end"></div>

<!-- LIGHT CARD SECTION -->
<div class="card-section">
<div class="wrap">
  <div class="tabs">
    <button class="tab on" onclick="show('board',this)">&#9658; OVERALL RANK</button>
    <button class="tab" onclick="show('teams',this)">&#9658; TEAMS</button>
    <button class="tab" onclick="show('howtowin',this)">&#9658; HOW TO WIN</button>
  </div>
  <div id="board" class="sec on"></div>
  <div id="teams" class="sec"></div>
  <div id="howtowin" class="sec"></div>
  <div class="footer"><div class="fl" id="footerL"></div><div class="fr">DIAL. BOOK. CLOSE. WIN.</div></div>
</div>
</div>

<script>
var DATA = {
  month:"April 2026", workDay:5, workDaysTotal:22, goal:1250000,
  updatedAt:"Tue Apr 7, 2026",
  reps:[
    {name:"Kenny",               rev:75000, cls:5, sets:4,  cc:0},
    {name:"Gloria",              rev:53000, cls:4, sets:17, cc:0},
    {name:"Brent Jackman",       rev:21000, cls:2, sets:5,  cc:0},
    {name:"Daniel Jordan",       rev:21000, cls:2, sets:8,  cc:0},
    {name:"Samuel Michalcin",    rev:10000, cls:1, sets:6,  cc:0},
    {name:"Shivang Kapoor",      rev:4000,  cls:1, sets:12, cc:0},
    {name:"Jesse Saunders",      rev:0,     cls:0, sets:21, cc:0},
    {name:"Paolo Kuizon",        rev:0,     cls:0, sets:13, cc:0},
    {name:"Petros Foustanellas", rev:0,     cls:0, sets:11, cc:0},
    {name:"Angelo Stringfellow", rev:0,     cls:0, sets:10, cc:0},

function actionGap(r,prev){
  if(!prev)return null;
  var g=prev.score-r.score;if(g<=0)return null;
  var s=[];
  if(mS>0){var gs=.35*(100/mS);if(gs>0){var n=Math.ceil(g/gs);if(n<=20)s.push(n+" more set"+(n!==1?"s":""));}}
  if(mC>0){var gc=.30*(100/mC);if(gc>0){var nc=Math.ceil(g/gc);if(nc<=5)s.push(nc+" more close"+(nc!==1?"s":""));}}
  if(mR>0){var gr=.35*(100/mR);if(gr>0){var nr=Math.ceil(g/gr);s.push(fmt$(nr)+" more rev");}}
  if(s.length===0)return g+" pts gap";
  return "Jump to #"+(scoredActive.indexOf(prev)+1)+": <em>"+s.slice(0,2).join(" or ")+"</em>";
}
